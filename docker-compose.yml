services:
  postgres:
    image: ankane/pgvector
    container_name: rag_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: rag_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: